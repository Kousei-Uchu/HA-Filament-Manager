print_label:
  name: Print Label
  description: >
    Render a Brother P-touch .lbx label template and send it to the USB-connected
    printer. Field names must match the object names defined in the .lbx template XML.
  fields:
    template:
      name: Template path
      description: >
        Absolute path to the .lbx label template file on the Home Assistant host.
        For example: /config/labels/tag_label.lbx
      required: true
      example: "/config/labels/tag_label.lbx"
      selector:
        text:

    quantity:
      name: Quantity
      description: Number of labels to print (1–500).
      required: true
      default: 1
      selector:
        number:
          min: 1
          max: 500
          mode: box

    fields:
      name: Merge fields
      description: >
        A dictionary of template field names and their text values.
        Field names must exactly match the object names in the .lbx XML.
        Common fields by template:
          tag_label.lbx       → Title, Variant Barcode, Price, Colour, Deal Tag
          mini_label.lbx      → Variant Barcode 1-4, Tag $ 1-4
          egg_label.lbx       → Title, Deal Tag, Colour, Price, Variant Barcode
          mini_priceless.lbx  → Variant Barcode 1-4
      required: true
      example: >
        Title: "Blue Dragon XL"
        Price: "$9.99"
        Colour: "Galaxy Blue"
        Deal Tag: "or 2 for $10.00"
        Variant Barcode: "https://aidens3dp.com/12345"
      selector:
        object:
